name: Terraform

on:
  push:
    branches:
      - main
      - master

  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform (${{ matrix.env }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - dev
          - prod

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-south-1
      TF_VAR_db_password: ci-plan-only-password

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Version
        run: terraform version

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../..

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -refresh=false -no-color -out=tfplan

      - name: Export Plan
        run: terraform show -no-color tfplan > plan_output.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.env }}
          path: infra/envs/${{ matrix.env }}/plan_output.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(
              'infra/envs/${{ matrix.env }}/plan_output.txt',
              'utf8'
            );

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan (${context.payload.pull_request.head.ref} - ${{ matrix.env }})

\`\`\`
${plan.substring(0,60000)}
\`\`\``
            });