name: Terraform CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform (${{ matrix.environment }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - prod

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-south-1
      TF_VAR_db_password: ci-plan-only-password

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Cache Terraform Plugins
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            infra/envs/${{ matrix.environment }}/.terraform
          key: terraform-${{ runner.os }}-${{ matrix.environment }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Terraform Version
        run: terraform version

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../..

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -refresh=false -no-color -out=tfplan

      - name: Export Terraform Plan
        run: terraform show -no-color tfplan > plan_output.txt

      - name: Upload Plan Output
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: infra/envs/${{ matrix.environment }}/plan_output.txt

      - name: Upload Binary Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/envs/${{ matrix.environment }}/tfplan

      - name: Comment Plan on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let plan = "Terraform plan output not found.";

            try {
              plan = fs.readFileSync(
                "infra/envs/${{ matrix.environment }}/plan_output.txt",
                "utf8"
              );
            } catch (err) {
              console.log(err);
            }

            if (plan.length > 60000) {
              plan =
                plan.substring(0, 60000) +
                "\n\n...Output truncated. Download the workflow artifact to view the complete Terraform plan.";
            }

            const body = `
            ## Terraform Plan - ${{ matrix.environment }}

            | Step | Status |
            |------|--------|
            | Terraform fmt | ✅ Passed |
            | Terraform init | ✅ Passed |
            | Terraform validate | ✅ Passed |
            | Terraform plan | ✅ Completed |

            <details>

            <summary>Show Terraform Plan</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Workflow Completed
        run: echo "Terraform validation completed successfully."