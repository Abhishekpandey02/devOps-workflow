services:
  db:
    image: postgres:16
    container_name: hotel-bookings-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: bookings
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # db/init contains a single init script that runs the migrations and
      # then the seed data, in order, on first container start. (Postgres's
      # docker-entrypoint-initdb.d hook only looks at *.sh/*.sql files placed
      # directly inside it, not nested subfolders, so migrations/seed live
      # alongside and are invoked from the init script.)
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/migrations:/migrations:ro
      - ./db/seed:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d bookings"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
